<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>View All Products</title>
    <style>
        * { box-sizing: border-box; font-family: Arial, sans-serif; }
        body { margin: 0; background: #f8fafc; }
        header {
            background: #0f172a;
            color: white;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .btn-link {
            text-decoration: none;
            background: #2563eb;
            color: white;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
        }
        .container {
            width: 95%;
            max-width: 1100px;
            margin: 35px auto;
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 18px;
        }
        .message {
            margin-top: 10px;
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 8px;
            background: #dbeafe;
            color: #1d4ed8;
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #cbd5e1;
        }
        th, td {
            padding: 12px;
            text-align: left;
        }
        th {
            background: #e2e8f0;
        }
    </style>
</head>
<body>
    <header>
        <h1>View All Products</h1>
        <a class="btn-link" href="product_management.html">Back</a>
    </header>

    <div class="container">
        <button onclick="viewAllProducts()">Load All Products</button>

        <div id="messageArea"></div>
        <div id="resultArea"></div>
    </div>

    <script>
        async function viewAllProducts() {
            const response = await fetch("/viewAllProducts");

            if (!response.ok) {
                document.getElementById("messageArea").innerHTML =
                    `<div class="message">Unable to fetch products.</div>`;
                document.getElementById("resultArea").innerHTML = "";
                return;
            }

            const products = await response.json();

            document.getElementById("messageArea").innerHTML =
                `<div class="message">All products fetched successfully.</div>`;

            if (!products || products.length === 0) {
                document.getElementById("resultArea").innerHTML =
                    "<p>No products found.</p>";
                return;
            }

            let rows = "";
            products.forEach(product => {
                rows += `
                    <tr>
                        <td>${product.id ?? ""}</td>
                        <td>${product.name ?? ""}</td>
                        <td>${product.description ?? ""}</td>
                        <td>${product.price ?? ""}</td>
                        <td>${product.photoUrl ?? ""}</td>
                    </tr>
                `;
            });

            document.getElementById("resultArea").innerHTML = `
                <table>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Price</th>
                        <th>Photo URL</th>
                    </tr>
                    ${rows}
                </table>
            `;
        }
    </script>
</body>
</html>
